servlet.version=6.1.0
faces.version=4.1.2
cdi.version=4.1.0
inject.version=2.0.1
annotation.version=3.0.0
el.version=6.0.1
interceptor.version=2.2.0

servlet.url=https://repo1.maven.org/maven2/jakarta/servlet/jakarta.servlet-api/${servlet.version}/jakarta.servlet-api-${servlet.version}.jar
