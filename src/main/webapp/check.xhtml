<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:c="http://java.sun.com/jsp/jstl/core"
      xmlns:p="http://primefaces.org/ui">
    <f:view>
        <h:head>
            <meta charset="UTF-8" />
            <title>Проверка попадания точки</title>
            <link rel="stylesheet" type="text/css" href="resources/styles/styles.css" />
            <h:outputScript library="js" name="area-svg.js" target="body"/>
        </h:head>

        <h:body>
            <!-- Шапка -->
            <header id="header">
                <div class="wrap">
                    <h1>Жеребцов Михаил Александрович — Группа P3217 — Вариант 2209</h1>
                </div>
            </header>

            <!-- Основной контент: график + форма -->
            <main class="wrap">
                <section class="layout">
                    <!-- Левая колонка: график -->
                    <div class="panel">
                        <h2>Область</h2>

                        <!-- Инлайн-SVG -->
                        <h:form id="areaSvg">
                            <figure class="area-figure">
                                <svg id="svgInput" class="area-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="График области">
                                    <defs>
                                        <style>
                                            .axis { stroke:#111; stroke-width:2; }
                                            .tick { stroke:#111; stroke-width:1.2; }
                                            .label { font: 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#111; }
                                            .region { fill:#4ea6ff; stroke:none; }
                                        </style>
                                    </defs>

                                    <!-- Новая область: сектор (III, радиус R/2), прямоугольник (I), треугольник (IV) -->
                                    <g>
                                        <!-- Прямоугольник в I квадранте: 0..R по x, 0..R/2 по y -->
                                        <!-- при нашей разметке: центр (200,200), R=120px, R/2=60px -->
                                        <rect class="region" x="80" y="200" width="120" height="60"/>

                                        <!-- Треугольник в IV: (0,0)→(R,0)→(R,-R/2) -->
                                        <polygon class="region" points="200,200 320,200 200,80"/>

                                        <!-- Сектор круга в III: радиус R/2 -->
                                        <!-- дуга от (200,260) до (140,200) с центром (200,200) -->
                                        <path class="region" d="M200,200 L140,200 A60,60 0 0 1 200,140 Z"/>
                                    </g>

                                    <!-- Оси -->
                                    <g>
                                        <!-- X -->
                                        <line class="axis" x1="20" y1="200" x2="380" y2="200"/>
                                        <path class="axis" d="M380,200 l-8,-4 l0,8 Z"/>
                                        <text class="label" x="388" y="205">x</text>
                                        <!-- Y -->
                                        <line class="axis" x1="200" y1="380" x2="200" y2="20"/>
                                        <path class="axis" d="M200,20 l-4,8 l8,0 Z"/>
                                        <text class="label" x="205" y="16">y</text>

                                        <!-- Тики/подписи по X -->
                                        <line class="tick" x1="80"  y1="195" x2="80"  y2="205"/><text class="label" x="72"  y="222">-R</text>
                                        <line class="tick" x1="140" y1="195" x2="140" y2="205"/><text class="label" x="120" y="222">-R/2</text>
                                        <line class="tick" x1="260" y1="195" x2="260" y2="205"/><text class="label" x="246" y="222">R/2</text>
                                        <line class="tick" x1="320" y1="195" x2="320" y2="205"/><text class="label" x="314" y="222">R</text>

                                        <!-- Тики/подписи по Y -->
                                        <line class="tick" x1="195" y1="80"  x2="205" y2="80"/><text class="label" x="210" y="84">R</text>
                                        <line class="tick" x1="195" y1="140" x2="205" y2="140"/><text class="label" x="210" y="144">R/2</text>
                                        <line class="tick" x1="195" y1="260" x2="205" y2="260"/><text class="label" x="210" y="264">-R/2</text>
                                        <line class="tick" x1="195" y1="320" x2="205" y2="320"/><text class="label" x="210" y="324">-R</text>
                                    </g>

                                    <g id="pointsLayer"></g>
                                </svg>
                            </figure>

                            <h:commandButton id="ajaxSend"
                                             action="#{areaBean.checkPoint}"
                                             style="display:none">
                                <f:ajax execute="@this" render="historyTable pointPlot"/>
                            </h:commandButton>

                            <h:outputText id="pointsJson"
                                          value="#{areaBean.pointsJson}"
                                          escape="false"
                                          style="display:none"/>
                        </h:form>
                    </div>

                    <!-- Правая колонка: форма -->
                    <div class="panel">
                        <h2>Проверка точки</h2>

                        <h:form id="pointForm">

                            <!-- X: inputText (-3 … 3) -->
                            <div class="form-row">
                                <h:outputLabel for="x" value="X:"/>
                                <h:inputText id="x"
                                             value="#{areaBean.x}"
                                             styleClass="field"
                                             title="X ∈ (-3; 3), десятичный разделитель — точка, до 2 знаков"
                                             required="true"
                                             label="X"
                                             autocomplete="off"
                                             placeholder="-3 … 3">
                                    <!-- серверная валидация по диапазону -->
                                    <f:convertNumber type="number" locale="en_US"/>
                                    <f:validateDoubleRange minimum="-3" maximum="3"
                                                           validatorMessage="X должен быть числом в диапазоне -3 … 3"/>
                                </h:inputText>
                                <h:message for="x" styleClass="error-msg" id="x-error"/>
                            </div>

                            <!-- Y: p:slider (-4 … 4), шаг 0.1 -->
                            <div class="form-row">
                                <h:outputLabel for="yInput" value="Y:"/>

                                <input type="range"
                                       id="ySlider"
                                       min="-4"
                                       max="4"
                                       step="0.1"
                                       class="y-range"/>

                                <h:inputText id="yInput"
                                             value="#{areaBean.y}"
                                             onkeydown="return false"
                                             onpaste="return false"
                                             styleClass="y-value">
                                    <f:convertNumber type="number"
                                                     locale="en_US"
                                                     minFractionDigits="1"
                                                     maxFractionDigits="1"/>
                                </h:inputText>
                                <h:message for="yInput" styleClass="error-msg"/>
                            </div>

                            <script>
                                document.addEventListener("DOMContentLoaded", function () {
                                  const slider  = document.getElementById("ySlider");
                                  const yInput  = document.getElementById("pointForm:yInput");

                                  if (!slider || !yInput) return;

                                  // начальное значение из бина (если есть), иначе 0
                                  const initial = yInput.value &amp;&amp; !isNaN(yInput.value) ? yInput.value : "0";
                                  slider.value = initial;
                                  yInput.value = Number(initial).toFixed(1);

                                  // при движении слайдера обновляем поле
                                  slider.addEventListener("input", function () {
                                    const v = slider.value;
                                    yInput.value = Number(v).toFixed(1);
                                  });
                                });

                                function resetY() {
                                    const yInput = document.getElementById("pointForm:yInput");
                                    const xInput = document.getElementById("pointForm:x");
                                    const slider = document.getElementById("ySlider");

                                    if (yInput) yInput.value = "0.0";
                                    if (xInput) xInput.value = null;
                                    if (slider) slider.value = "0";
                                }
                            </script>

                            <!-- R: selectOneMenu { '1','2','3','4','5' } -->
                            <div class="form-row">
                                <h:outputLabel for="r" value="R:"/>
                                <h:selectOneMenu id="r"
                                                 value="#{areaBean.r}"
                                                 styleClass="field"
                                                 required="true"
                                                 label="R"
                                                 requiredMessage="Выберите R от 1 до 5">
                                    <f:selectItem itemValue="1" itemLabel="1"/>
                                    <f:selectItem itemValue="2" itemLabel="2"/>
                                    <f:selectItem itemValue="3" itemLabel="3"/>
                                    <f:selectItem itemValue="4" itemLabel="4"/>
                                    <f:selectItem itemValue="5" itemLabel="5"/>
                                </h:selectOneMenu>
                                <h:message for="r" styleClass="error-msg"/>
                            </div>

                            <div class="form-actions">
                                <h:commandButton value="Проверить" action="#{areaBean.checkPoint}" styleClass="btn primary-btn">
                                    <f:ajax execute="@form"
                                            render="historyTable x-error pointsJson"
                                            onevent="onAjaxUpdate"
                                    />
                                </h:commandButton>
                                <button class="btn secondary-btn" onclick="resetY();">Очистить</button>
                            </div>
                        </h:form>

                        <h:form id="svgForm" style="display:none" prependId="false">

                            <h:inputHidden id="svgX" value="#{areaBean.x}" />
                            <h:inputHidden id="svgY" value="#{areaBean.y}" />
                            <h:inputHidden id="svgR" value="#{areaBean.r}" />

                            <h:commandButton id="svgSubmit"
                                             action="#{areaBean.checkPoint}"
                                             style="display:none;">
                                <f:ajax execute="svgX svgY svgR"
                                        render="historyTable areaSvg pointsJson"
                                        onevent="onAjaxUpdate" />
                            </h:commandButton>

                        </h:form>
                    </div>
                </section>

                <!-- Таблица истории -->
                <section class="panel">
                    <h2>История проверок</h2>

                    <h:panelGroup id="historyTable">
                        <div class="table-wrap">
                            <table id="historyTable" class="table">
                                <thead>
                                <tr>
                                    <th>X</th>
                                    <th>Y</th>
                                    <th>R</th>
                                    <th>Попадание</th>
                                    <th>Текущее время</th>
                                    <th>Время работы, нс</th>
                                </tr>
                                </thead>
                                <tbody>
                                    <c:forEach items="#{areaBean.history}" var="rec">
                                        <tr>
                                            <td>
                                                <h:outputText value="#{rec.x}">
                                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" locale="en_US"/>
                                                </h:outputText>
                                            </td>
                                            <td>
                                                <h:outputText value="#{rec.y}">
                                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" locale="en_US"/>
                                                </h:outputText>
                                            </td>
                                            <td>#{rec.r}</td>
                                            <td>#{rec.hit ? 'Да' : 'Нет'}</td>
                                            <td>
                                                <h:outputText value="#{rec.timeAsDate}">
                                                    <f:convertDateTime pattern="yyyy-MM-dd HH:mm:ss" />
                                                </h:outputText>
                                            </td>
                                            <td>#{rec.timingMs}</td>
                                        </tr>
                                    </c:forEach>
                                </tbody>
                            </table>
                        </div>
                    </h:panelGroup>

                    <div class="history-actions">
                        <h:form id="clearForm" prependId="false">
                            <p:commandButton value="Очистить историю"
                                             action="#{areaBean.clearHistory}"
                                             update="historyTable areaSvg"
                                             immediate="true"
                                             ajax="true"
                                             styleClass="btn-clear"
                                             oncomplete="redraw();"/>
                        </h:form>
                    </div>
                </section>

                <section class="panel">
                    <h:link outcome="backPage" styleClass="app-link">
                        Перейти к стартовой странице приложения
                    </h:link>
                </section>
            </main>
        </h:body>
    </f:view>
</html>
