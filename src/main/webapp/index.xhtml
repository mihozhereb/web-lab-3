<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<f:view locale="ru">
    <h:head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>#{msg['app.title']}</title>
        <link rel="stylesheet" href="resources/styles/styles.css"/>
    </h:head>

    <h:body>
        <header id="header">
            <div class="wrap">
                <h1>#{msg['app.student']}</h1>
            </div>
        </header>

        <main class="wrap">
            <section class="panel">
                <h2>#{msg['index.clock.title']}</h2>
                <div class="clock-panel-body">
                    <div>#{msg['index.clock.description']}</div>
                    <div class="clock-time">
                        <h:outputText id="clock" value="#{clockBean.now}" />
                        <p:poll interval="11" update="clock"/>
                    </div>
                </div>
            </section>

            <section class="panel">
                <h:link outcome="nextPage" styleClass="app-link">
                    #{msg['index.to.main']}
                </h:link>
            </section>
        </main>
    </h:body>
</f:view>

</html>
